name: release-main

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Create virtual environment
        run: uv venv

      - name: Install build tools
        run: |
          uv pip install build twine

      - name: Check version matches tag
        id: vars
        run: echo tag=${GITHUB_REF#refs/*/v} >> $GITHUB_OUTPUT

      - name: Assert version
        run: |
          uv run python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])" > version.txt
          echo "pyproject version: $(cat version.txt)"
          echo "tag: ${{ steps.vars.outputs.tag }}"
          test "$(cat version.txt)" = "${{ steps.vars.outputs.tag }}"

      - name: Build
        run: uv run python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: uv run twine upload dist/*
